  LogSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <LogSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Minimum log level. Values: Normal, Debug, NetworkDebug, VerboseNetworkDebug-->
      <LogLevel>Debug</LogLevel>
      <!--Specify the amount of days a log file should be considered as expired and deleted. 0 = Disabled-->
      <ExpireLogs>14</ExpireLogs>
      <!--Use UTC instead of system time in the log.-->
      <UseUtcTimeInLog>false</UseUtcTimeInLog>
    </LogSettingsDefinition>
  MasterServerSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <MasterServerSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Set to false if you don't want to appear on the server list-->
      <RegisterWithMasterServer>true</RegisterWithMasterServer>
      <!--Specify in miliseconds how often we will update the info with masterserver. Min value = 5000-->
      <MasterServerRegistrationMsInterval>5000</MasterServerRegistrationMsInterval>
    </MasterServerSettingsDefinition>
  ScreenshotSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <ScreenshotSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Minimum interval between screenshots in milliseconds-->
      <MinScreenshotIntervalMs>30000</MinScreenshotIntervalMs>
      <!--Max screenshot width in pixels-->
      <MaxScreenshotWidth>1920</MaxScreenshotWidth>
      <!--Max screenshot height in pixels-->
      <MaxScreenshotHeight>1080</MaxScreenshotHeight>
      <!--Maximum screenshots kept per user-->
      <MaxScreenshotsPerUser>30</MaxScreenshotsPerUser>
      <!--Maximum screenshots folders kept-->
      <MaxScreenshotsFolders>50</MaxScreenshotsFolders>
    </ScreenshotSettingsDefinition>
  WarpSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <WarpSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Specify the warp Type. Values: None, Subspace-->
      <WarpMode>Subspace</WarpMode>
    </WarpSettingsDefinition>
  WebsiteSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <WebsiteSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Enable the website system that allows to retrieve server information in JSON format. You can get the data at http://YourIP:Port-->
      <EnableWebsite>true</EnableWebsite>
      <!--The address that the web server listens on. Falls back to ConnectionSettings.ListenAddress if unset, which defaults to [::]-->
      <ListenAddress></ListenAddress>
      <!--TCP port. You will need to open this port on your router if you want to display the data from outside your local network-->
      <Port>8900</Port>
      <!--Interval for refreshing the information of players and vessels-->
      <RefreshIntervalMs>5000</RefreshIntervalMs>
    </WebsiteSettingsDefinition>

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/lunamultiplayer/lunamultiplayer/server
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "master"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
