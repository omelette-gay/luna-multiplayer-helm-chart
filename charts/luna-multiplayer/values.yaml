# Default values for luna-multiplayer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

storage:
  universe:
    request: 1Gi
    className: ""
    pvcLabels: {}
  plugins:
    request: 1Gi
    className: ""
    pvcLabels: {}

gameService:
  type: ClusterIP
  port: 8800

webService:
  type: ClusterIP
  port: 8900
  ingress:
    hostname: luna-multiplayer.local
    annotations: {}
    tls: []

config:
  ConnectionSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
      <ConnectionSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--The address the server listens on, needs to be either [::] or 0.0.0.0. If set to the unspecified IPv6 address [::], the server listens for both IPv6 and IPv4-->
      <ListenAddress>::</ListenAddress>
      <!--The UDP port the server listens on. You don't need to open it on your router if RegisterWithMasterServer = true. If you want that players can connect against your server MANUALLY you will need to open it on your router-->
      <Port>8800</Port>
      <!--Heartbeat interval in ms. MUST be lower than the ConnectionMsTimeout value.-->
      <HearbeatMsInterval>1000</HearbeatMsInterval>
      <!--Connection timeout in ms. If no heartbeats are received after this interval, the client is disconnected.-->
      <ConnectionMsTimeout>30000</ConnectionMsTimeout>
      <!--Tries to use UPnP to open the ports in your router-->
      <Upnp>true</Upnp>
      <!--UPnP timeout in ms for trying to open the ports-->
      <UpnpMsTimeout>5000</UpnpMsTimeout>
      <!--Maximum transmission unit (MTU) size in bytes. Min value is 1. Default value is 1408. Max value is 8192.-->
      <MaximumTransmissionUnit>1408</MaximumTransmissionUnit>
      <!--Try to expand MTU size-->
      <AutoExpandMtu>false</AutoExpandMtu>
    </ConnectionSettingsDefinition>
  CraftSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <CraftSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Minimum interval between uploading/requesting crafts in milliseconds-->
      <MinCraftLibraryRequestIntervalMs>5000</MinCraftLibraryRequestIntervalMs>
      <!--Maximum crafts kept per user per type (VAB,SPH and Subassembly)-->
      <MaxCraftsPerUser>10</MaxCraftsPerUser>
      <!--Maximum crafts folders kept-->
      <MaxCraftFolders>50</MaxCraftFolders>
    </CraftSettingsDefinition>
  DebugSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <DebugSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--A percentage value to simulate the probability of a packet loss. From 0.0% to 100.0%-->
      <SimulatedLossChance>0</SimulatedLossChance>
      <!--A percentage value to simulate the probability of a packet duplication. From 0.0% to 100.0%-->
      <SimulatedDuplicatesChance>0</SimulatedDuplicatesChance>
      <!--Max random latency that a packet may have-->
      <MaxSimulatedRandomLatencyMs>0</MaxSimulatedRandomLatencyMs>
      <!--Minimum latency that a packet will have-->
      <MinSimulatedLatencyMs>0</MinSimulatedLatencyMs>
      <!--Custom master server to register with for debugging purposes-->
      <CustomMasterServer></CustomMasterServer>
    </DebugSettingsDefinition>
  DedicatedServerSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <DedicatedServerSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Use rainbow effect for the server in the server browser-->
      <UseRainbowEffect>true</UseRainbowEffect>
      <!--If UseRainbowEffect is false use RedGreenBlue fields to specify server color (Valid values are from 0 to 255)-->
      <Red>255</Red>
      <!--If UseRainbowEffect is false use RedGreenBlue fields to specify server color (Valid values are from 0 to 255)-->
      <Green>0</Green>
      <!--If UseRainbowEffect is false use RedGreenBlue fields to specify server color (Valid values are from 0 to 255)-->
      <Blue>0</Blue>
    </DedicatedServerSettingsDefinition>
  GameplaySettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <GameplaySettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Allow Reverting-->
      <CanRevert>true</CanRevert>
      <!--Missing Crews Respawn-->
      <MissingCrewsRespawn>true</MissingCrewsRespawn>
      <!--Crew Respawn Time-->
      <RespawnTime>2</RespawnTime>
      <!--Auto-Hire Crewmembers before Flight-->
      <AutoHireCrews>false</AutoHireCrews>
      <!--No Entry Purchase Required on Research-->
      <BypassEntryPurchaseAfterResearch>true</BypassEntryPurchaseAfterResearch>
      <!--Indestructible Facilities-->
      <IndestructibleFacilities>false</IndestructibleFacilities>
      <!--Allow Stock Vessels-->
      <AllowStockVessels>false</AllowStockVessels>
      <!--Allow Other launch sites (for users that have the Making History DLC)-->
      <AllowOtherLaunchSites>true</AllowOtherLaunchSites>
      <!--Re-Entry Heating-->
      <ReentryHeatScale>1</ReentryHeatScale>
      <!--Resource Abundance-->
      <ResourceAbundance>1</ResourceAbundance>
      <!--Enable Comm Network-->
      <CommNetwork>true</CommNetwork>
      <!--Starting Funds-->
      <StartingFunds>25000</StartingFunds>
      <!--Starting Science-->
      <StartingScience>0</StartingScience>
      <!--Starting Reputation-->
      <StartingReputation>0</StartingReputation>
      <!--Science Rewards-->
      <ScienceGainMultiplier>1</ScienceGainMultiplier>
      <!--Funds Rewards-->
      <FundsGainMultiplier>1</FundsGainMultiplier>
      <!--Reputation Rewards-->
      <RepGainMultiplier>1</RepGainMultiplier>
      <!--Funds Penalties-->
      <FundsLossMultiplier>1</FundsLossMultiplier>
      <!--Reputation Penalties-->
      <RepLossMultiplier>1</RepLossMultiplier>
      <!--Decline Penalty-->
      <RepLossDeclined>1</RepLossDeclined>
      <!--Enable Kerbal Experience-->
      <KerbalExp>true</KerbalExp>
      <!--Kerbals Level Up Immediately-->
      <ImmediateLevelUp>false</ImmediateLevelUp>
      <!--Allow Negative Funds/Science-->
      <AllowNegativeCurrency>false</AllowNegativeCurrency>
      <!--Enable parts pressure limits-->
      <PressurePartLimits>false</PressurePartLimits>
      <!--Enable parts G limits-->
      <GPartLimits>false</GPartLimits>
      <!--Enable Kerbal G limits-->
      <GKerbalLimits>false</GKerbalLimits>
      <!--Kerbal G tolerance multiplier-->
      <KerbalGToleranceMult>1</KerbalGToleranceMult>
      <!--Resource Transfer Obeys Crossfeed Rules-->
      <ObeyCrossfeedRules>false</ObeyCrossfeedRules>
      <!--Always allow action groups-->
      <ActionGroupsAlways>false</ActionGroupsAlways>
      <!--Building Impact Damage Multiplier-->
      <BuildingDamageMultiplier>0.05</BuildingDamageMultiplier>
      <!--Part Upgrades-->
      <PartUpgrades>true</PartUpgrades>
      <!--Require Signal for Control-->
      <RequireSignalForControl>false</RequireSignalForControl>
      <!--Plasma blackout-->
      <ReentryBlackout>false</ReentryBlackout>
      <!--Range Modifier-->
      <RangeModifier>1</RangeModifier>
      <!--DSN Modifier-->
      <DsnModifier>1</DsnModifier>
      <!--Occlusion Modifier, Vac-->
      <OcclusionModifierVac>0.9</OcclusionModifierVac>
      <!--Occlusion Modifier, Atm-->
      <OcclusionModifierAtm>0.75</OcclusionModifierAtm>
      <!--Enable Extra Groundstations-->
      <ExtraGroundstations>true</ExtraGroundstations>
      <!--Enable full SAS in Sandbox-->
      <EnableFullSASInSandbox>false</EnableFullSASInSandbox>
    </GameplaySettingsDefinition>
  GeneralSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <GeneralSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Name of the server. Max 30 char-->
      <ServerName>Luna Server</ServerName>
      <!--Description of the server. Max 200 char-->
      <Description>Luna Server Description</Description>
      <!--By default this will be given by the masterserver but you can override it here if you want. Max 2 char-->
      <CountryCode></CountryCode>
      <!--Website text to display (discord, website, forum, etc). Can be left empty. Max 15 char-->
      <WebsiteText>LMP</WebsiteText>
      <!--Actual website URL. Can be left empty. Max 60 char-->
      <Website>lunamultiplayer.com</Website>
      <!--Password for the server. Leave it empty if you want to make a public server. Max 30 chars-->
      <Password></Password>
      <!--Admin password for the server. Leave it empty if you don't want to allow server administration from KSP. Max 30 chars-->
      <AdminPassword></AdminPassword>
      <!--Specify the server's MOTD (message of the day). 255 chars max-->
      <ServerMotd>Hi %Name%!
      Welcome to %ServerName%.
      Online players: %PlayerCount%</ServerMotd>
      <!--Writes the server's MOTD (message of the day) in the chat of the user who joins-->
      <PrintMotdInChat>false</PrintMotdInChat>
      <!--Maximum amount of players that can join the server.-->
      <MaxPlayers>20</MaxPlayers>
      <!--Maximum length of a username.-->
      <MaxUsernameLength>15</MaxUsernameLength>
      <!--Specify in minutes how often /dekessler automatically runs. 0 = Disabled-->
      <AutoDekessler>0.5</AutoDekessler>
      <!--Specify in minutes how often /nukeksc automatically runs. 0 = Disabled-->
      <AutoNuke>0</AutoNuke>
      <!--Enable use of Cheats in-game.-->
      <Cheats>true</Cheats>
      <!--Allow players to sack kerbals-->
      <AllowSackKerbals>false</AllowSackKerbals>
      <!--Specify the Name that will appear when you send a message using the server's console.-->
      <ConsoleIdentifier>Server</ConsoleIdentifier>
      <!--Specify the gameplay difficulty of the server. Values: Easy, Normal, Moderate, Hard, Custom-->
      <GameDifficulty>Normal</GameDifficulty>
      <!--Specify the game Type. Values: Sandbox, Career, Science-->
      <GameMode>Sandbox</GameMode>
      <!--Enable mod control. WARNING:
        Only consider turning off mod control for private servers. The game will constantly complain about missing parts if there are missing mods. Read this wiki page: https://github.com/LunaMultiplayer/LunaMultiplayer/wiki/Mod-file to understand how it works-->
      <ModControl>true</ModControl>
      <!--How many untracked asteroids to spawn into the universe. 0 = Disabled-->
      <NumberOfAsteroids>5</NumberOfAsteroids>
      <!--How many untracked comets to spawn into the universe. 0 = Disabled-->
      <NumberOfComets>5</NumberOfComets>
      <!--Terrain quality. All clients will need to have this setting in their KSP to avoid terrain differences. Values: Low, Default, High, Ignore. Using 'Ignore' might create bugs-->
      <TerrainQuality>High</TerrainQuality>
      <!--Specify the minimum distance in which vessels can interact with eachother at the launch pad and runway-->
      <SafetyBubbleDistance>100</SafetyBubbleDistance>
      <!--Max number of parts that a vessel can have when spawning-->
      <MaxVesselParts>200</MaxVesselParts>
    </GeneralSettingsDefinition>
  IntervalSettings.xml: >
    <?xml version="1.0" encoding="utf-16"?>
    <IntervalSettingsDefinition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!--Interval in ms at which the client will send POSITION and FLIGHTSTATE updates of their vessel when other players are NEARBY. Decrease it if your clients have good network connection and you plan to do dogfights, although in that case consider using interpolation aswell-->
      <VesselUpdatesMsInterval>50</VesselUpdatesMsInterval>
      <!--Interval in ms at which the client will send POSITION and FLIGHTSTATE updates for vessels that are uncontrolled and nearby them. This interval is also applied used to send position updates of HIS OWN vessel when NOBODY is around-->
      <SecondaryVesselUpdatesMsInterval>150</SecondaryVesselUpdatesMsInterval>
      <!--Send/Receive tick clock. Keep this value low but at least above 2ms to avoid extreme CPU usage.-->
      <SendReceiveThreadTickMs>5</SendReceiveThreadTickMs>
      <!--Main thread polling in ms. Keep this value low but at least above 2ms to avoid extreme CPU usage.-->
      <MainTimeTick>5</MainTimeTick>
      <!--Interval in ms at which internal LMP structures (Subspaces, Vessels, Scenario files, ...) will be backed up to a file-->
      <BackupIntervalMs>30000</BackupIntervalMs>
      <!--Interval to force a garbage collection and reduce the memory usage. Specify this value in minutes. 0 = deactivated.-->
      <GcMinutesInterval>15</GcMinutesInterval>
    </IntervalSettingsDefinition>
